<div class="container mt-5" [formGroup]="form">
  <h3>{{ "game-options.choose-settings" | translate }}</h3>
  <p *ngIf="errorMessage">{{ errorMessage }}</p>
  <div class="form-group">
    <label for="regionSelect">{{ "region" | translate }}</label>
    <select class="form-control" formControlName="region" id="regionSelect">
      <option value="World">World</option>
      @for(region of regions;track region.id){
      <option [value]="region.name">{{ region.name }}</option>
      }
    </select>
  </div>

  <div class="form-group">
    <label>{{ "game-options.timer-options" | translate }}:</label>

    @for(duration of durations;track duration.id){
    <div class="form-check">
      <input
        class="form-check-input"
        type="radio"
        [id]="'timer' + duration.id"
        [value]="duration.id"
        formControlName="durationId"
      />
      <label class="form-check-label" [for]="'timer' + duration.id">
        {{ duration.value }} {{ "game-options.seconds" | translate }}
      </label>
    </div>
    }
  </div>

  <button (click)="onSubmit()" class="btn btn-primary">
    {{ "game-options.start-game" | translate }}
  </button>
</div>
