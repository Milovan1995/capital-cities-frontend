<nav class="navbar navbar-default" role="navigation">
  <div class="navbar-shell">
    <a class="brand-mark" routerLink="/home" aria-label="Front Capitals home">
      <span class="brand-mark__orb" aria-hidden="true">
        <span class="brand-mark__ring"></span>
        <span class="brand-mark__ring brand-mark__ring--inner"></span>
        <span class="brand-mark__core"></span>
      </span>
      <span class="brand-mark__copy">
        <strong>Capital Cities</strong>
        <small>World Quiz</small>
      </span>
    </a>

    <ul class="nav navbar-nav navbar-links" *ngIf="navbarLinks.length > 0">
      @for (link of navbarLinks; track $index) {
        <li>
          <a [routerLink]="link.route">{{ link.name | translate }}</a>
        </li>
      }
    </ul>

    <div class="navbar-controls">
      <ul class="nav navbar-nav session-links">
        @if (!isLoggedIn) {
          <li>
            <a routerLink="/pages/login">{{ "login" | translate }}</a>
          </li>
        }
        @if (isLoggedIn) {
          <li>
            <a (click)="logout()" routerLink="/home">{{
              "logout" | translate
            }}</a>
          </li>
        }
      </ul>

      <label class="theme-picker" for="themePicker">
        <span class="picker-label">{{ "themes.label" | translate }}</span>
        <select
          id="themePicker"
          name="themePicker"
          class="theme-select"
          [ngModel]="themeService.currentTheme()"
          (ngModelChange)="switchTheme($event)"
        >
          @for (theme of themeOptions; track theme.value) {
            <option [value]="theme.value">
              {{ theme.labelKey | translate }}
            </option>
          }
        </select>
      </label>

      <div class="language-options" aria-label="Language selector">
        <img
          src="/assets/images/748048_flag_montenegro_icon.png"
          alt="MNE"
          (click)="switchLanguage(languages.me)"
          [ngStyle]="{ opacity: language === languages.me ? 1 : 0.45 }"
        />
        <img
          src="/assets/images/748050_flag_usa_icon.png"
          alt="EN"
          (click)="switchLanguage(languages.en)"
          [ngStyle]="{ opacity: language === languages.me ? 0.45 : 1 }"
        />
      </div>
    </div>
  </div>
</nav>
